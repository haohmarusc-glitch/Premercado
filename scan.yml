# .github/workflows/scan.yml
#
# Cron horário do agente de monitoramento.
# Roda agent_scan.py em dias úteis, cobrindo pré-market + pregão (horário US).
#
# Persistência de estado:
#   - Interino (sem banco): actions/cache guarda o agent_state.json entre runs.
#   - Robusto: aponte load_state/save_state do agent_scan.py pro Supabase e
#     remova os passos de cache (veja comentários abaixo).

name: agent-scan

on:
  schedule:
    # GitHub usa UTC. 08:00–21:00 UTC ≈ 04:00–17:00 ET (cobre pré-market e pregão).
    # Atenção: o cron do Actions pode atrasar alguns minutos em horários de pico.
    - cron: "0 8-21 * * 1-5"
  workflow_dispatch:        # permite disparar manualmente pela aba Actions

# Evita duas execuções simultâneas pisando no mesmo estado.
concurrency:
  group: agent-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10     # corta o job se pendurar (rede do yfinance, etc.)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ---- Persistência de estado via cache (REMOVER ao migrar pro Supabase) ----
      # Restaura o estado da última execução. A chave rotaciona por run (run_id),
      # com restore-keys pegando o cache mais recente que começa com "agent-state-".
      - name: Restaurar estado
        id: state-restore
        uses: actions/cache/restore@v4
        with:
          path: agent_state.json
          key: agent-state-${{ github.run_id }}
          restore-keys: |
            agent-state-

      - name: Rodar varredura
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AGENT_STATE_PATH: agent_state.json
          # Ao migrar: adicione SUPABASE_URL / SUPABASE_KEY aqui como secrets.
          # SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          # SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python agent_scan.py

      # Salva o estado atualizado num cache novo (chave única por run).
      - name: Salvar estado
        if: always()        # salva mesmo se a varredura falhar parcialmente
        uses: actions/cache/save@v4
        with:
          path: agent_state.json
          key: agent-state-${{ github.run_id }}
      # ---- Fim do bloco de cache ----
