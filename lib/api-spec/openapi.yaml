openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Pre-market agent API for MU and SMCI monitoring
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: reports
    description: Pre-market analysis reports
  - name: observations
    description: Agent memory observations
  - name: agent
    description: Agent execution

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /reports:
    get:
      operationId: listReports
      tags: [reports]
      summary: List all pre-market reports
      responses:
        "200":
          description: List of reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"

  /reports/{id}:
    get:
      operationId: getReport
      tags: [reports]
      summary: Get a specific report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "404":
          description: Not found

  /reports/latest:
    get:
      operationId: getLatestReport
      tags: [reports]
      summary: Get today's latest report
      responses:
        "200":
          description: Latest report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "404":
          description: No report yet today

  /observations:
    get:
      operationId: listObservations
      tags: [observations]
      summary: List recent observations (agent memory)
      parameters:
        - name: ticker
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of observations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Observation"

  /observations/summary:
    get:
      operationId: getObservationsSummary
      tags: [observations]
      summary: Summary of sentiment per ticker over last 7 days
      responses:
        "200":
          description: Sentiment summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SentimentSummary"

  /agent/run:
    post:
      operationId: runAgent
      tags: [agent]
      summary: Trigger the pre-market agent run
      responses:
        "200":
          description: Agent completed, returns report id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRunResult"
        "409":
          description: Agent already running

  /alerts:
    get:
      operationId: listAlerts
      tags: [agent]
      summary: List all price alerts
      responses:
        "200":
          description: Alerts list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceAlert"
    post:
      operationId: createAlert
      tags: [agent]
      summary: Create a new price alert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertCreateInput"
      responses:
        "201":
          description: Created alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceAlert"
        "400":
          description: Invalid input

  /alerts/{id}:
    delete:
      operationId: deleteAlert
      tags: [agent]
      summary: Delete a price alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
    patch:
      operationId: toggleAlert
      tags: [agent]
      summary: Toggle alert enabled/disabled
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertToggleInput"
      responses:
        "200":
          description: Updated alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceAlert"
        "404":
          description: Not found

  /alerts/firings/summary:
    get:
      operationId: getAlertFiringsSummary
      tags: [agent]
      summary: Summary counts for alerts and today's firings
      responses:
        "200":
          description: Alerts summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertsSummary"

  /alerts/{id}/firings:
    get:
      operationId: listAlertFirings
      tags: [agent]
      summary: List firing history for a price alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Firing history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AlertFiring"
        "404":
          description: Not found

  /tickers/chart:
    get:
      operationId: getTickerChart
      tags: [agent]
      summary: Get OHLCV chart data for a ticker
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: period
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TickerChart"
        "400":
          description: Missing symbol

  /tickers/quotes:
    get:
      operationId: getTickerQuotes
      tags: [agent]
      summary: Get real-time quotes for monitored tickers
      responses:
        "200":
          description: Ticker quotes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TickerQuote"

  /agent/status:
    get:
      operationId: getAgentStatus
      tags: [agent]
      summary: Get current agent run status
      responses:
        "200":
          description: Agent status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentStatus"

  /agent/runs:
    get:
      operationId: listAgentRuns
      tags: [agent]
      summary: List agent execution history
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of agent runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentRun"

  /settings:
    get:
      operationId: getSettings
      tags: [agent]
      summary: Get current app settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    patch:
      operationId: updateSettings
      tags: [agent]
      summary: Update app settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
        "400":
          description: Invalid input

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Report:
      type: object
      required: [id, date, content, tickers, createdAt]
      properties:
        id:
          type: integer
        date:
          type: string
        content:
          type: string
        tickers:
          type: array
          items:
            type: string
        createdAt:
          type: string

    Observation:
      type: object
      required: [id, ticker, date, summary, sentiment, createdAt]
      properties:
        id:
          type: integer
        ticker:
          type: string
        date:
          type: string
        summary:
          type: string
        sentiment:
          type: string
        priceAtObservation:
          type: ["number", "null"]
        createdAt:
          type: string

    SentimentSummary:
      type: object
      required: [ticker, bullish, bearish, neutral, lastSentiment, lastDate]
      properties:
        ticker:
          type: string
        bullish:
          type: integer
        bearish:
          type: integer
        neutral:
          type: integer
        lastSentiment:
          type: string
        lastDate:
          type: string

    AgentRunResult:
      type: object
      required: [reportId, message]
      properties:
        reportId:
          type: integer
        message:
          type: string

    AgentStatus:
      type: object
      required: [running, lastRunAt]
      properties:
        running:
          type: boolean
        lastRunAt:
          type: ["string", "null"]
        currentStep:
          type: ["string", "null"]
        nextRunAt:
          type: ["string", "null"]
        scheduleEnabled:
          type: boolean

    PriceAlert:
      type: object
      required: [id, symbol, condition, thresholdPct, enabled, createdAt]
      properties:
        id: { type: integer }
        symbol: { type: string }
        condition: { type: string }
        thresholdPct: { type: number }
        enabled: { type: boolean }
        lastTriggeredAt: { type: ["string", "null"] }
        createdAt: { type: string }

    AlertCreateInput:
      type: object
      required: [symbol, condition, thresholdPct]
      properties:
        symbol: { type: string }
        condition: { type: string }
        thresholdPct: { type: number }

    AlertToggleInput:
      type: object
      required: [enabled]
      properties:
        enabled: { type: boolean }

    AlertsSummary:
      type: object
      required: [total, active, firingToday]
      properties:
        total: { type: integer }
        active: { type: integer }
        firingToday: { type: integer }

    AlertFiring:
      type: object
      required: [id, alertId, symbol, condition, thresholdPct, changePctAtFiring, firedAt]
      properties:
        id: { type: integer }
        alertId: { type: integer }
        symbol: { type: string }
        condition: { type: string }
        thresholdPct: { type: number }
        changePctAtFiring: { type: number }
        priceAtFiring: { type: ["number", "null"] }
        firedAt: { type: string }

    Candle:
      type: object
      required: [t, o, h, l, c, v]
      properties:
        t: { type: integer }
        o: { type: number }
        h: { type: number }
        l: { type: number }
        c: { type: number }
        v: { type: integer }

    TickerChart:
      type: object
      required: [symbol, period, candles]
      properties:
        symbol: { type: string }
        period: { type: string }
        candles:
          type: array
          items:
            $ref: "#/components/schemas/Candle"
        error:
          type: ["string", "null"]

    TickerQuote:
      type: object
      required: [symbol]
      properties:
        symbol:
          type: string
        price:
          type: ["number", "null"]
        change:
          type: ["number", "null"]
        changePct:
          type: ["number", "null"]
        open:
          type: ["number", "null"]
        previousClose:
          type: ["number", "null"]
        dayHigh:
          type: ["number", "null"]
        dayLow:
          type: ["number", "null"]
        volume:
          type: ["integer", "null"]
        marketCap:
          type: ["integer", "null"]
        error:
          type: ["string", "null"]

    AgentRun:
      type: object
      required: [id, startedAt, status, trigger]
      properties:
        id:
          type: integer
        startedAt:
          type: string
        finishedAt:
          type: ["string", "null"]
        status:
          type: string
        trigger:
          type: string
        durationMs:
          type: ["integer", "null"]
        errorMessage:
          type: ["string", "null"]

    Settings:
      type: object
      required: [id, notifyEmail, scheduleEnabled, scheduleHour, tickers, updatedAt]
      properties:
        id:
          type: integer
        notifyEmail:
          type: string
        scheduleEnabled:
          type: boolean
        scheduleHour:
          type: integer
        tickers:
          type: array
          items:
            type: string
        updatedAt:
          type: string

    SettingsUpdate:
      type: object
      properties:
        notifyEmail:
          type: string
        scheduleEnabled:
          type: boolean
        scheduleHour:
          type: integer
        tickers:
          type: array
          items:
            type: string
