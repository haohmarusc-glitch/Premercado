openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Pre-market agent API for MU and SMCI monitoring
servers:
  - url: /api
    description: Base API path
tags:
  - name: auth
    description: Email/password authentication
  - name: health
    description: Health operations
  - name: reports
    description: Pre-market analysis reports
  - name: observations
    description: Agent memory observations
  - name: agent
    description: Agent execution
  - name: chat
    description: Conversational chat sessions
  - name: portfolio
    description: Portfolio positions, purchases and cash
  - name: watchlist
    description: Ticker watchlist
  - name: journal
    description: Trade journal

paths:
  /auth/signup:
    post:
      operationId: authSignup
      tags: [auth]
      summary: Create a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        "201":
          description: Account created and logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "409":
          description: Email already registered

  /auth/login:
    post:
      operationId: authLogin
      tags: [auth]
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid email or password

  /auth/logout:
    post:
      operationId: authLogout
      tags: [auth]
      summary: Log out and clear the session cookie
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getAuthMe
      tags: [auth]
      summary: Get the currently logged-in user, if any
      responses:
        "200":
          description: Current session state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"

  /auth/claim-seed-account:
    post:
      operationId: authClaimSeedAccount
      tags: [auth]
      summary: One-time claim of the pre-existing owner account (sets its real password)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimSeedAccountBody"
      responses:
        "200":
          description: Account claimed and logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "403":
          description: Email does not match the seed account, or it was already claimed

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /reports:
    get:
      operationId: listReports
      tags: [reports]
      summary: List all pre-market reports
      responses:
        "200":
          description: List of reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"

  /reports/{id}:
    get:
      operationId: getReport
      tags: [reports]
      summary: Get a specific report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "404":
          description: Not found

  /reports/latest:
    get:
      operationId: getLatestReport
      tags: [reports]
      summary: Get today's latest report
      responses:
        "200":
          description: Latest report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "404":
          description: No report yet today

  /observations:
    get:
      operationId: listObservations
      tags: [observations]
      summary: List recent observations (agent memory)
      parameters:
        - name: ticker
          in: query
          required: false
          schema:
            type: string
        - name: tickers
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of observations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Observation"

  /observations/summary:
    get:
      operationId: getObservationsSummary
      tags: [observations]
      summary: Summary of sentiment per ticker over last 7 days
      responses:
        "200":
          description: Sentiment summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SentimentSummary"

  /agent/run:
    post:
      operationId: runAgent
      tags: [agent]
      summary: Trigger the pre-market agent run
      responses:
        "200":
          description: Agent completed, returns report id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRunResult"
        "409":
          description: Agent already running

  /alerts:
    get:
      operationId: listAlerts
      tags: [agent]
      summary: List all price alerts
      responses:
        "200":
          description: Alerts list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceAlert"
    post:
      operationId: createAlert
      tags: [agent]
      summary: Create a new price alert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertCreateInput"
      responses:
        "201":
          description: Created alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceAlert"
        "400":
          description: Invalid input

  /alerts/{id}:
    delete:
      operationId: deleteAlert
      tags: [agent]
      summary: Delete a price alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
    patch:
      operationId: toggleAlert
      tags: [agent]
      summary: Toggle alert enabled/disabled
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertToggleInput"
      responses:
        "200":
          description: Updated alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceAlert"
        "404":
          description: Not found

  /alerts/firings/summary:
    get:
      operationId: getAlertFiringsSummary
      tags: [agent]
      summary: Summary counts for alerts and today's firings
      responses:
        "200":
          description: Alerts summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertsSummary"

  /alerts/{id}/firings:
    get:
      operationId: listAlertFirings
      tags: [agent]
      summary: List firing history for a price alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Firing history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AlertFiring"
        "404":
          description: Not found

  /tickers/chart:
    get:
      operationId: getTickerChart
      tags: [agent]
      summary: Get OHLCV chart data for a ticker
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: period
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TickerChart"
        "400":
          description: Missing symbol

  /tickers/quotes:
    get:
      operationId: getTickerQuotes
      tags: [agent]
      summary: Get real-time quotes for monitored tickers
      responses:
        "200":
          description: Ticker quotes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TickerQuote"

  /fx/usdbrl:
    get:
      operationId: getFxUsdBrl
      tags: [agent]
      summary: Current USD to BRL exchange rate (Yahoo BRL=X)
      responses:
        "200":
          description: FX rate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FxRate"
        "502":
          description: Rate unavailable

  /agent/status:
    get:
      operationId: getAgentStatus
      tags: [agent]
      summary: Get current agent run status
      responses:
        "200":
          description: Agent status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentStatus"

  /agent/runs:
    get:
      operationId: listAgentRuns
      tags: [agent]
      summary: List agent execution history
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of agent runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentRun"

  /agent/spend:
    get:
      operationId: getAgentSpend
      tags: [agent]
      summary: Get today's LLM spend broken down by provider, plus daily budget status
      responses:
        "200":
          description: Spend summary for today (Brasília time)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSpend"

  /activity/heartbeat:
    post:
      operationId: activityHeartbeat
      tags: [activity]
      summary: Report the current user's active page (heartbeat for online/last-seen tracking)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivityHeartbeatInput"
      responses:
        "204":
          description: Recorded
        "400":
          description: Invalid input

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all users with activity status (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
        "403":
          description: Admin access required

  /admin/users/{id}/password:
    patch:
      operationId: updateUserPassword
      tags: [admin]
      summary: Set a new password for a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPasswordUpdate"
      responses:
        "204":
          description: Password updated
        "400":
          description: Invalid input
        "403":
          description: Admin access required
        "404":
          description: Not found

  /admin/users/{id}:
    delete:
      operationId: deleteAdminUser
      tags: [admin]
      summary: Delete a user account and all its data (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: User deleted
        "400":
          description: Cannot delete your own account
        "403":
          description: Admin access required
        "404":
          description: Not found

  /news:
    get:
      operationId: getNews
      tags: [agent]
      summary: Manchetes recentes por ativo (yfinance, traduzidas para pt-BR)
      parameters:
        - name: tickers
          in: query
          required: false
          schema:
            type: string
          description: Tickers separados por vírgula. Se omitido, usa os tickers monitorados em Settings.
      responses:
        "200":
          description: Manchetes agrupadas por ticker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsFeedResponse"

  /settings:
    get:
      operationId: getSettings
      tags: [agent]
      summary: Get current app settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    patch:
      operationId: updateSettings
      tags: [agent]
      summary: Update app settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
        "400":
          description: Invalid input

  /chat/sessions:
    get:
      operationId: listChatSessions
      tags: [chat]
      summary: List chat sessions
      responses:
        "200":
          description: Chat sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatSession"

  /chat/sessions/{id}/messages:
    get:
      operationId: getChatMessages
      tags: [chat]
      summary: List messages of a chat session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Chat messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
        "404":
          description: Not found

  /chat/sessions/{id}:
    delete:
      operationId: deleteChatSession
      tags: [chat]
      summary: Delete a chat session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /portfolio:
    get:
      operationId: listPortfolioPositions
      tags: [portfolio]
      summary: List portfolio positions
      responses:
        "200":
          description: Positions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortfolioPosition"
    post:
      operationId: createPortfolioPosition
      tags: [portfolio]
      summary: Create a portfolio position
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioPositionCreate"
      responses:
        "201":
          description: Created position
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioPosition"
        "400":
          description: Invalid input

  /portfolio/{id}:
    put:
      operationId: updatePortfolioPosition
      tags: [portfolio]
      summary: Update a portfolio position
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioPositionUpdate"
      responses:
        "200":
          description: Updated position
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioPosition"
        "404":
          description: Not found
    delete:
      operationId: deletePortfolioPosition
      tags: [portfolio]
      summary: Delete a portfolio position
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /portfolio/{id}/purchases:
    get:
      operationId: listPortfolioPurchases
      tags: [portfolio]
      summary: List purchases of a position
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Purchases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortfolioPurchase"
        "400":
          description: Invalid id
    post:
      operationId: createPortfolioPurchase
      tags: [portfolio]
      summary: Add a purchase to a position
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioPurchaseCreate"
      responses:
        "201":
          description: Created purchase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioPurchase"
        "400":
          description: Invalid input

  /portfolio/purchases/{purchaseId}:
    patch:
      operationId: updatePortfolioPurchase
      tags: [portfolio]
      summary: Update a purchase (amount, purchase price, sale fields)
      parameters:
        - name: purchaseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioPurchaseUpdate"
      responses:
        "200":
          description: Updated purchase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioPurchase"
        "404":
          description: Not found
    delete:
      operationId: deletePortfolioPurchase
      tags: [portfolio]
      summary: Delete a purchase
      parameters:
        - name: purchaseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /portfolio/cash:
    get:
      operationId: getPortfolioCash
      tags: [portfolio]
      summary: Get uninvested cash (USD) per portfolio mode
      responses:
        "200":
          description: Cash per mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashBalance"
    patch:
      operationId: updatePortfolioCash
      tags: [portfolio]
      summary: Set uninvested cash (USD) for a portfolio mode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CashUpdate"
      responses:
        "200":
          description: Updated cash per mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashBalance"
        "400":
          description: Invalid input

  /watchlist:
    get:
      operationId: listWatchlist
      tags: [watchlist]
      summary: List watchlist items
      responses:
        "200":
          description: Watchlist
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WatchlistItem"
    post:
      operationId: createWatchlist
      tags: [watchlist]
      summary: Add a ticker to the watchlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchlistItemCreate"
      responses:
        "201":
          description: Created watchlist item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistItem"
        "400":
          description: Invalid input

  /watchlist/{id}:
    delete:
      operationId: deleteWatchlistItem
      tags: [watchlist]
      summary: Remove a ticker from the watchlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /journal:
    get:
      operationId: listJournal
      tags: [journal]
      summary: List trade journal entries
      responses:
        "200":
          description: Journal entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JournalEntry"
    post:
      operationId: createJournalEntry
      tags: [journal]
      summary: Create a journal entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JournalEntryCreate"
      responses:
        "201":
          description: Created entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"
        "400":
          description: Invalid input

  /journal/{id}:
    put:
      operationId: updateJournalEntry
      tags: [journal]
      summary: Update a journal entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JournalEntryUpdate"
      responses:
        "200":
          description: Updated entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"
        "404":
          description: Not found
    delete:
      operationId: deleteJournalEntry
      tags: [journal]
      summary: Delete a journal entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

components:
  schemas:
    AuthCredentials:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    AuthUser:
      type: object
      required: [id, email, isAdmin]
      properties:
        id:
          type: integer
        email:
          type: string
        isAdmin:
          type: boolean

    AuthMeResponse:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: "#/components/schemas/AuthUser"
            - type: "null"

    ActivityHeartbeatInput:
      type: object
      required: [path]
      properties:
        path:
          type: string
          maxLength: 200

    AdminUser:
      type: object
      required: [id, email, isAdmin, isClaimed, createdAt, lastSeenAt, lastPath, online]
      properties:
        id:
          type: integer
        email:
          type: string
        isAdmin:
          type: boolean
        isClaimed:
          type: boolean
        createdAt:
          type: string
        lastSeenAt:
          type: ["string", "null"]
        lastPath:
          type: ["string", "null"]
        online:
          type: boolean

    UserPasswordUpdate:
      type: object
      required: [newPassword]
      properties:
        newPassword:
          type: string
          minLength: 8

    ClaimSeedAccountBody:
      type: object
      required: [email, newPassword]
      properties:
        email:
          type: string
          format: email
        newPassword:
          type: string
          minLength: 8

    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Report:
      type: object
      required: [id, date, content, tickers, mode, createdAt]
      properties:
        id:
          type: integer
        date:
          type: string
        content:
          type: string
        tickers:
          type: array
          items:
            type: string
        mode:
          type: string
        createdAt:
          type: string

    Observation:
      type: object
      required: [id, ticker, date, summary, sentiment, createdAt]
      properties:
        id:
          type: integer
        ticker:
          type: string
        date:
          type: string
        summary:
          type: string
        sentiment:
          type: string
        priceAtObservation:
          type: ["number", "null"]
        userNotes:
          type: ["string", "null"]
        createdAt:
          type: string

    SentimentSummary:
      type: object
      required: [ticker, bullish, bearish, neutral, lastSentiment, lastDate]
      properties:
        ticker:
          type: string
        bullish:
          type: integer
        bearish:
          type: integer
        neutral:
          type: integer
        lastSentiment:
          type: string
        lastDate:
          type: string

    AgentRunResult:
      type: object
      required: [reportId, message]
      properties:
        reportId:
          type: integer
        message:
          type: string

    AgentStatus:
      type: object
      required: [running, lastRunAt]
      properties:
        running:
          type: boolean
        lastRunAt:
          type: ["string", "null"]
        currentStep:
          type: ["string", "null"]
        nextRunAt:
          type: ["string", "null"]
        scheduleEnabled:
          type: boolean
        uptimeSeconds:
          type: number
          description: "Segundos desde que o processo do servidor subiu (process.uptime())."

    PriceAlert:
      type: object
      required: [id, symbol, indicator, condition, enabled, createdAt]
      properties:
        id: { type: integer }
        symbol: { type: string }
        indicator: { type: string, description: "'price' | 'rsi' | 'macd' | 'sma20' | 'sma50'" }
        condition: { type: string }
        thresholdPct: { type: ["number", "null"] }
